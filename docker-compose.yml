version: "3.9"

services:
  wa-linker:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS:-admin123}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
